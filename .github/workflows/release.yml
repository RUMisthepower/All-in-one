# ============================================================
# GitHub Actions Workflow для автоматического создания релиза
# ============================================================
#
# КАК ЭТО РАБОТАЕТ:
# 1. Вы создаёте и отправляете тег версии (например, v1.15)
#    git tag v1.15
#    git push origin v1.15
#
# 2. GitHub Actions автоматически запускает этот workflow
#
# 3. Workflow:
#    - Клонирует репозиторий
#    - Извлекает версию из тега
#    - Извлекает изменения из CHANGELOG.md
#    - Устанавливает jq для работы с JSON
#    - Автоматически исправляет pack.mcmeta (обновляет description)
#    - Генерирует gtnh-pack-update.json с информацией о версии
#    - Создаёт ZIP-архив (с исправленным pack.mcmeta, но без gtnh-pack-update.json)
#    - Публикует релиз с ZIP + gtnh-pack-update.json в Assets
#
# 4. Готово! Файлы появятся в разделе релиза
#
# ============================================================

name: Create Release

on:
  push:
    tags:
      - 'v*'  # Запускать только при пуше тегов вида v1.0, v2.1.3 и т.д.

permissions:
  contents: write  # Необходимые права для создания релиза и загрузки файлов

jobs:
  build-and-release:
    runs-on: ubuntu-latest  # Используем последний образ Ubuntu
    steps:
      # ============================================================
      # Шаг 1: Клонируем репозиторий
      # ============================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Получаем полную историю для работы с CHANGELOG

      # ============================================================
      # Шаг 2: Извлекаем версию из тега
      # ============================================================
      - name: Extract version from tag
        id: vars
        run: |
          TAG="${{ github.ref_name }}"          # например, v1.15
          VERSION_NUM="${TAG#v}"                # например, 1.15
          
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION_NUM=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "✅ Extracted version: $VERSION_NUM"

      # ============================================================
      # Шаг 3: Извлекаем изменения из CHANGELOG.md
      # ============================================================
      - name: Extract latest changelog entry
        run: |
          awk '
            /^## \[/ { 
              if (found) exit;  # Если уже нашли первую секцию, выходим
              found=1;          # Начинаем запись
              print;            # Печатаем заголовок
              next;
            }
            found { print }     # Печатаем всё содержимое секции
          ' CHANGELOG.md > RELEASE_NOTES.md
          
          # Показываем, что получилось (для отладки в логах)
          echo "=== RELEASE_NOTES.md ==="
          cat RELEASE_NOTES.md
          echo "========================"

      # ============================================================
      # Шаг 4: Устанавливаем jq для работы с JSON
      # ============================================================
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      # ============================================================
      # Шаг 5: Автоматически исправляем pack.mcmeta
      # ============================================================
      - name: Fix pack.mcmeta
        run: |
          PACK_META="pack.mcmeta"
          
          if [ -f "$PACK_META" ]; then
            # Собираем все нужные переменные
            REPO_NAME="${{ github.event.repository.name }}"
            OWNER="${{ github.repository_owner }}"
            VERSION_NUM="${{ steps.vars.outputs.VERSION_NUM }}"
            
            # Формируем описание в нужном формате с цветовыми кодами Minecraft
            DESC="§6GTNH§f v2.8.X §8/§3 Pack v${VERSION_NUM} §aby§b ${OWNER}"
            
            echo "🔧 Updating pack.mcmeta with:"
            echo "   - description : $DESC"
            echo "   - pack_name   : $REPO_NAME"
            echo "   - pack_version: $VERSION_NUM"
            echo "   - owner       : $OWNER"
            echo "   - repo        : $REPO_NAME"
            
            # Одним вызовом jq обновляем все 5 полей
            jq \
              --arg desc "$DESC" \
              --arg pname "$REPO_NAME" \
              --arg pver "$VERSION_NUM" \
              --arg owner "$OWNER" \
              --arg repo "$REPO_NAME" \
              '
                .pack.description = $desc |
                .gtnh_resource_pack_updater.pack_name = $pname |
                .gtnh_resource_pack_updater.pack_version = $pver |
                .gtnh_resource_pack_updater.source.owner = $owner |
                .gtnh_resource_pack_updater.source.repo = $repo
              ' "$PACK_META" > temp.mcmeta && mv temp.mcmeta "$PACK_META"
            
            echo "✅ Updated pack.mcmeta:"
            cat "$PACK_META"
          else
            echo "⚠️ Warning: pack.mcmeta not found, skipping fix"
          fi

      # ============================================================
      # Шаг 6: Генерируем gtnh-pack-update.json
      # ============================================================
      - name: Generate gtnh-pack-update.json
        run: |
          cat > gtnh-pack-update.json <<EOF
          {
            "schema": 1,
            "pack_game_version": "2.8.X",
            "pack_version": "${{ steps.vars.outputs.VERSION_NUM }}"
          }
          EOF
          
          echo "✅ Generated gtnh-pack-update.json:"
          cat gtnh-pack-update.json

      # ============================================================
      # Шаг 7: Создаём ZIP-архив (с исправленным pack.mcmeta)
      # ============================================================
      - name: Create ZIP archive
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: '${{ github.event.repository.name }}-${{ github.ref_name }}.zip'
          path: '.'
          # Исключаем служебные файлы + gtnh-pack-update.json (он будет отдельным ассетом)
          exclusions: '*.git* .github/* *.md gtnh-pack-update.json'

      # ============================================================
      # Шаг 8: Публикуем релиз с двумя файлами
      # ============================================================
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: "RELEASE_NOTES.md"
          draft: false
          prerelease: false
          files: |
            ${{ github.event.repository.name }}-${{ github.ref_name }}.zip
            gtnh-pack-update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}